 <!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="color-scheme" content="light only">
    <title>Ultimate Chess: Local & Online</title>
    <style>
        :root {
            --light-sq: #ffffff;
            --dark-sq: #739552;
            --highlight: rgba(0, 0, 0, 0.15);
            --selected: rgba(241, 196, 15, 0.6);
            --coord-light: #739552;
            --coord-dark: #ffffff;
            --bg-color: #222222;
            --panel-bg: #111111;
        }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            user-select: none;
        }

        /* Control Panel */
                #controls {
                    display: flex;
                    gap: 15px;
                    margin-bottom: 10px;
                    width: 100%;
                    max-width: 480px;
                    box-sizing: border-box;
                    flex-wrap: wrap;
                    justify-content: center;
                    align-items: center;
                }

        #controls select, #controls button {
                    background: rgba(255, 255, 255, 0.05);
                    color: #ccc;
                    border: none;
                    padding: 8px 16px;
                    border-radius: 20px;
                    font-size: 13px;
                    cursor: pointer;
                    transition: all 0.3s ease;
                    outline: none;
                    font-family: inherit;
                    font-weight: 500;
                }

                #controls button:hover, #controls select:hover {
                    background: rgba(255, 255, 255, 0.15);
                    color: #fff;
                }

                .online-only { display: none; }

        /* Captured Pieces Zones */
        .captured-zone {
            width: 100%;
            max-width: 480px;
            min-height: 40px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 5px;
            padding: 5px;
            box-sizing: border-box;
        }
        
        .captured-zone img {
            width: 30px;
            height: 30px;
            transition: transform 0.4s ease;
        }

        #top-captured { justify-content: flex-start; }
        #bottom-captured { justify-content: flex-end; }

        /* The Board */
        #board {
            display: grid;
            grid-template-columns: repeat(8, 1fr);
            grid-template-rows: repeat(8, 1fr);
            width: 100%;
            max-width: 480px;
            aspect-ratio: 1 / 1;
            border: 2px solid #333;
        }

        .square {
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .light { background-color: var(--light-sq); }
        .dark { background-color: var(--dark-sq); }

        /* Coordinates */
        .coord {
            position: absolute;
            font-size: clamp(10px, 3vw, 13px);
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
        }
        .rank-coord { top: 2px; left: 3px; }
        .file-coord { bottom: 0px; right: 3px; }
        .light .coord { color: var(--coord-light); }
        .dark .coord { color: var(--coord-dark); }

        /* Pieces and Highlights */
        .piece {
            width: 85%;
            height: 85%;
            object-fit: contain;
            transition: transform 0.5s ease;
            transform-origin: center center;
            pointer-events: none;
        }

        .rotate-piece { transform: rotate(180deg); }
        .black-piece { filter: grayscale(1) brightness(2.5); }
        .selected { background-color: var(--selected) !important; }
        
        .possible-move::after {
            content: '';
            position: absolute;
            width: 30%;
            height: 30%;
            background-color: var(--highlight);
            border-radius: 50%;
            pointer-events: none;
        }

        /* Chat */
                #chat-container {
                    width: 100%;
                    max-width: 480px;
                    display: none;
                    flex-direction: column;
                    margin-top: 15px;
                    gap: 8px;
                }
                #chat-box {
                    height: 90px;
                    overflow-y: auto;
                    background: transparent;
                    font-size: 13px;
                    color: #ccc;
                    padding: 0 5px;
                    display: flex;
                    flex-direction: column;
                    gap: 6px;
                    scrollbar-width: thin;
                    scrollbar-color: #444 transparent;
                }
                #chat-box::-webkit-scrollbar {
                    width: 4px;
                }
                #chat-box::-webkit-scrollbar-thumb {
                    background-color: #444;
                    border-radius: 4px;
                }
                #chat-input {
                    width: 100%;
                    padding: 10px 15px;
                    box-sizing: border-box;
                    background: rgba(255, 255, 255, 0.05);
                    color: white;
                    border: none;
                    border-radius: 20px;
                    outline: none;
                    font-size: 13px;
                    transition: background 0.3s ease;
                }
                #chat-input:focus {
                    background: rgba(255, 255, 255, 0.1);
                }
                #chat-input::placeholder {
                    color: #777;
                }
    </style>
</head>
<body>

    <div id="controls">
            <select id="mode-select">
                <option value="local">Pass & Play</option>
                <option value="online">Online</option>
            </select>
            <select id="color-select" class="online-only">
                        <option value="w">Play White</option>
                        <option value="b">Play Black</option>
                    </select>
                    <button id="reset-btn">Reset Game</button>
                    <button id="resign-btn" style="display:none;">Resign</button>
                    <button id="draw-btn" style="display:none;">Offer Draw</button>
                </div>

                <div id="top-captured" class="captured-zone"></div>
    <div id="board"></div>
    <div id="bottom-captured" class="captured-zone"></div>

    <div id="chat-container">
        <div id="chat-box"></div>
        <input type="text" id="chat-input" placeholder="Type a message... (Press Enter)">
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
    <script type="module">
            import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
            import { getDatabase, ref, onValue, set, push, off, get } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-database.js";

        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBhg8EM5pSFqtqPCtCnzcySYC6DMoRBevE",
            databaseURL: "https://chess-361a1-default-rtdb.firebaseio.com"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Game State
        const game = new Chess();
        const standardCounts = { p: 8, n: 2, b: 2, r: 2, q: 1 };
        
        let currentMode = 'local';
                const roomId = 'global_live_room';
                let myColor = 'w';
        
                let selectedSquare = null;
                let possibleMoves = [];
                let currentDrawOffer = null;

                // DOM Elements
                const boardEl = document.getElementById('board');
                const topCaptured = document.getElementById('top-captured');
                const bottomCaptured = document.getElementById('bottom-captured');
                const chatContainer = document.getElementById('chat-container');
                const chatBox = document.getElementById('chat-box');
                const chatInput = document.getElementById('chat-input');
        
                const modeSelect = document.getElementById('mode-select');
                        const colorSelect = document.getElementById('color-select');
                        const resetBtn = document.getElementById('reset-btn');
                        const resignBtn = document.getElementById('resign-btn');
                        const drawBtn = document.getElementById('draw-btn');
                        const onlineOnlyElements = document.querySelectorAll('.online-only');

                // UI Event Listeners
                        modeSelect.addEventListener('change', async (e) => {
                            currentMode = e.target.value;
                            const isOnline = currentMode === 'online';
            
                            onlineOnlyElements.forEach(el => el.style.display = isOnline ? 'inline-block' : 'none');
                            chatContainer.style.display = isOnline ? 'flex' : 'none';
                            resignBtn.style.display = isOnline ? 'inline-block' : 'none';
                            drawBtn.style.display = isOnline ? 'inline-block' : 'none';

                            off(ref(db, 'games/'));
                            selectedSquare = null;
                            possibleMoves = [];

                            if (isOnline) {
                                const snapshot = await get(ref(db, 'games/' + roomId + '/fen'));
                                if (snapshot.exists()) {
                                    game.load(snapshot.val());
                                } else {
                                    game.reset();
                                    set(ref(db, 'games/' + roomId + '/fen'), game.fen());
                                }
                                setupFirebaseListeners();
                            } else {
                                game.reset();
                            }
                            renderBoard();
                        });

                        colorSelect.addEventListener('change', (e) => {
                            myColor = e.target.value;
                            renderBoard();
                        });

                        resetBtn.addEventListener('click', () => {
                            if (confirm("Are you sure you want to reset the board?")) {
                                game.reset();
                                selectedSquare = null;
                                possibleMoves = [];
                                currentDrawOffer = null;
                                if (currentMode === 'online') {
                                    set(ref(db, 'games/' + roomId + '/fen'), game.fen());
                                    set(ref(db, 'games/' + roomId + '/drawOffer'), null);
                                    push(ref(db, 'games/' + roomId + '/chat'), { text: `[System]: Game reset by ${myColor === 'w' ? 'White' : 'Black'}.` });
                                }
                                renderBoard();
                            }
                        });

                resignBtn.addEventListener('click', () => {
                    if (game.game_over()) return;
                    const loser = currentMode === 'online' ? (myColor === 'w' ? 'White' : 'Black') : (game.turn() === 'w' ? 'White' : 'Black');
                    endGame(`[System]: ${loser} has resigned. Game Reset.`);
                });

                drawBtn.addEventListener('click', () => {
                            if (game.game_over()) return;
            
                            if (currentMode === 'local') {
                                if (confirm("Do both players agree to a draw?")) {
                                    endGame(`[System]: Draw mutually agreed. Game Reset.`);
                                }
                            } else {
                                if (currentDrawOffer === null) {
                                    set(ref(db, 'games/' + roomId + '/drawOffer'), myColor);
                                    push(ref(db, 'games/' + roomId + '/chat'), { text: `[System]: ${myColor === 'w' ? 'White' : 'Black'} offered a draw.` });
                                } else if (currentDrawOffer !== myColor) {
                                    endGame(`[System]: Draw mutually agreed. Game Reset.`);
                                    set(ref(db, 'games/' + roomId + '/drawOffer'), null);
                                }
                            }
                        });

                        function endGame(systemMsg) {
                            if (currentMode === 'online') {
                                push(ref(db, 'games/' + roomId + '/chat'), { text: systemMsg });
                            } else {
                                alert(systemMsg);
                            }
                            game.reset();
                            if (currentMode === 'online') {
                                set(ref(db, 'games/' + roomId + '/fen'), game.fen());
                                set(ref(db, 'games/' + roomId + '/drawOffer'), null);
                            }
                            renderBoard();
                        }

                

        function setupFirebaseListeners() {
                    // Sync Board state
                    onValue(ref(db, 'games/' + roomId + '/fen'), (snapshot) => {
                        const newFen = snapshot.val();
                        if (newFen && newFen !== game.fen()) {
                            game.load(newFen);
                            selectedSquare = null;
                            possibleMoves = [];
                            renderBoard();
                        }
                    });

                    // Sync Draw Offers
                    onValue(ref(db, 'games/' + roomId + '/drawOffer'), (snapshot) => {
                        currentDrawOffer = snapshot.val();
                        if (currentDrawOffer) {
                            if (currentDrawOffer === myColor) {
                                drawBtn.innerText = 'Draw Offered...';
                                drawBtn.style.opacity = '0.5';
                                drawBtn.style.pointerEvents = 'none';
                            } else {
                                drawBtn.innerText = 'Accept Draw';
                                drawBtn.style.opacity = '1';
                                drawBtn.style.pointerEvents = 'auto';
                                drawBtn.style.color = '#f1c40f'; // Highlight
                            }
                        } else {
                            drawBtn.innerText = 'Offer Draw';
                            drawBtn.style.opacity = '1';
                            drawBtn.style.pointerEvents = 'auto';
                            drawBtn.style.color = '#ccc';
                        }
                    });

                    // Sync Chat
                    onValue(ref(db, 'games/' + roomId + '/chat'), (snapshot) => {
                chatBox.innerHTML = '';
                snapshot.forEach((child) => {
                    const msg = document.createElement('div');
                    msg.innerText = child.val().text;
                    chatBox.appendChild(msg);
                });
                chatBox.scrollTop = chatBox.scrollHeight;
            });
        }

        function renderBoard() {
            boardEl.innerHTML = '';
            const boardData = game.board();
            let currentPieces = { w: { p:0, n:0, b:0, r:0, q:0 }, b: { p:0, n:0, b:0, r:0, q:0 } };
            
            // Determine viewing perspective
            const isBoardFlipped = currentMode === 'local' ? game.turn() === 'b' : myColor === 'b';

            for (let r = 0; r < 8; r++) {
                for (let c = 0; c < 8; c++) {
                    const squareData = boardData[r][c];
                    const sqId = String.fromCharCode(97 + c) + (8 - r);
                    
                    const sqEl = document.createElement('div');
                    sqEl.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
                    sqEl.id = sqId;
                    
                    if (selectedSquare === sqId) sqEl.classList.add('selected');
                    if (possibleMoves.some(m => m.to === sqId)) sqEl.classList.add('possible-move');

                    if (squareData) {
                        currentPieces[squareData.color][squareData.type]++;
                        
                        const img = document.createElement('img');
                        img.src = `https://chessboardjs.com/img/chesspieces/wikipedia/${squareData.color}${squareData.type.toUpperCase()}.png`;
                        img.className = `piece ${isBoardFlipped ? 'rotate-piece' : ''} ${squareData.color === 'b' ? 'black-piece' : ''}`;
                            
                        if (squareData.type === 'k' && game.in_check() && squareData.color === game.turn()) {
                            img.style.filter = img.style.filter ? `${img.style.filter} drop-shadow(0 0 12px rgba(255, 0, 0, 0.95))` : 'drop-shadow(0 0 12px rgba(255, 0, 0, 0.95))';
                        }
                        sqEl.appendChild(img);
                    }
                    
                    if (c === 0) {
                        const rankLabel = document.createElement('div');
                        rankLabel.className = `coord rank-coord ${isBoardFlipped ? 'rotate-piece' : ''}`;
                        rankLabel.innerText = 8 - r;
                        sqEl.appendChild(rankLabel);
                    }
                    if (r === 7) {
                        const fileLabel = document.createElement('div');
                        fileLabel.className = `coord file-coord ${isBoardFlipped ? 'rotate-piece' : ''}`;
                        fileLabel.innerText = String.fromCharCode(97 + c);
                        sqEl.appendChild(fileLabel);
                    }

                    sqEl.addEventListener('click', () => handleSquareClick(sqId));
                    boardEl.appendChild(sqEl);
                }
            }

            renderCapturedPieces(currentPieces, isBoardFlipped);
                    }

                    function handleSquareClick(sqId) {
                        if (game.game_over()) return;
                        // Prevent moving if online and not your turn
                        if (currentMode === 'online' && game.turn() !== myColor) return;

            if (selectedSquare) {
                const moveAttempt = game.move({
                    from: selectedSquare,
                    to: sqId,
                    promotion: 'q' // Auto-promote to queen for simplicity
                });

                if (moveAttempt) {
                    if (currentMode === 'online') {
                        set(ref(db, 'games/' + roomId + '/fen'), game.fen());
                    }
                    selectedSquare = null;
                    possibleMoves = [];
                    renderBoard();
                    return;
                }
            }

            const pieceOnSquare = game.get(sqId);
            if (pieceOnSquare && pieceOnSquare.color === game.turn()) {
                selectedSquare = sqId;
                possibleMoves = game.moves({ square: sqId, verbose: true });
            } else {
                selectedSquare = null;
                possibleMoves = [];
            }
            
            renderBoard();
        }

        function renderCapturedPieces(currentPieces, isBoardFlipped) {
            topCaptured.innerHTML = '';
            bottomCaptured.innerHTML = '';

            const whiteCapturedZone = isBoardFlipped ? bottomCaptured : topCaptured;
            const blackCapturedZone = isBoardFlipped ? topCaptured : bottomCaptured;

            ['p', 'n', 'b', 'r', 'q'].forEach(type => {
                const capturedBlack = standardCounts[type] - currentPieces.b[type];
                for (let i = 0; i < capturedBlack; i++) {
                    let img = document.createElement('img');
                    img.src = `https://chessboardjs.com/img/chesspieces/wikipedia/b${type.toUpperCase()}.png`;
                    img.className = `black-piece ${isBoardFlipped ? 'rotate-piece' : ''}`;
                    blackCapturedZone.appendChild(img);
                }

                const capturedWhite = standardCounts[type] - currentPieces.w[type];
                for (let i = 0; i < capturedWhite; i++) {
                    let img = document.createElement('img');
                    img.src = `https://chessboardjs.com/img/chesspieces/wikipedia/w${type.toUpperCase()}.png`;
                    img.className = isBoardFlipped ? 'rotate-piece' : '';
                    whiteCapturedZone.appendChild(img);
                }
            });
        }

        // Chat Input Handler
        chatInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && chatInput.value.trim()) {
                const prefix = myColor === 'w' ? '[White]: ' : '[Black]: ';
                push(ref(db, 'games/' + roomId + '/chat'), { 
                    text: prefix + chatInput.value.trim() 
                });
                chatInput.value = '';
            }
        });

        // Fullscreen Toggle
        document.body.addEventListener('dblclick', (e) => {
            if (e.target === document.body) {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(err => console.log(err));
                } else {
                    document.exitFullscreen().catch(err => console.log(err));
                }
            }
        });

        // Initial render
        renderBoard();
    </script>
</body>
</html>
